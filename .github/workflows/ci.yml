name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine:
    name: Engine — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace @mpc/engine
      - run: npm run test --workspace @mpc/engine
      # Fail if the committed dataset drifts from the source workbook.
      - run: npm run extract --workspace @mpc/engine
      - run: git diff --exit-code packages/engine/data packages/engine/src/dataset.generated.ts

  api:
    name: API — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace @mpc/engine
      - run: npm run prisma:generate --workspace @mpc/api
      - run: npm run typecheck --workspace @mpc/api
      - run: npm run build --workspace @mpc/api

  api-e2e:
    name: API — migrations & smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mpc
          POSTGRES_PASSWORD: mpc
          POSTGRES_DB: mpc
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mpc" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://mpc:mpc@localhost:5432/mpc?schema=public
      JWT_SECRET: ci-secret
      ALLOW_DEV_LOGIN: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace @mpc/engine
      - run: npm run prisma:generate --workspace @mpc/api
      - run: npm run prisma:migrate --workspace @mpc/api
      - run: npm run db:seed --workspace @mpc/api
      - run: npm run build --workspace @mpc/api
      - name: Boot API and probe health + a real compatibility check
        run: |
          node apps/api/dist/main.js &
          API_PID=$!
          for i in $(seq 1 30); do curl -sf http://localhost:3001/api/v1/health && break || sleep 1; done
          TOKEN=$(curl -sf -X POST http://localhost:3001/api/v1/auth/token \
            -H 'content-type: application/json' \
            -d '{"email":"engineer@forvia.local"}' | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).accessToken))")
          echo "Checking 2700T2 x 978 (expected NOT_COMPATIBLE)"
          curl -sf http://localhost:3001/api/v1/compatibility/check \
            -H "authorization: Bearer $TOKEN" -H 'content-type: application/json' \
            -d '{"pressId":"2700T2","moldId":"978"}' | grep -q NOT_COMPATIBLE
          kill $API_PID

  web:
    name: Web — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace @mpc/web
      - run: npm run build --workspace @mpc/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [engine, api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
