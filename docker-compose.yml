services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mpc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mpc}
      POSTGRES_DB: ${POSTGRES_DB:-mpc}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mpc} -d ${POSTGRES_DB:-mpc}']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-mpc}:${POSTGRES_PASSWORD:-mpc}@db:5432/${POSTGRES_DB:-mpc}?schema=public
      JWT_SECRET: ${JWT_SECRET:-please-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      ALLOW_DEV_LOGIN: ${ALLOW_DEV_LOGIN:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:-}
      OIDC_ROLES_CLAIM: ${OIDC_ROLES_CLAIM:-roles}
    ports:
      - '3001:3001'

  # One-off: seeds the database with the canonical dataset + demo users.
  # Run with:  docker compose run --rm seed
  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mpc}:${POSTGRES_PASSWORD:-mpc}@db:5432/${POSTGRES_DB:-mpc}?schema=public
    command: ['sh', '-c', 'npx prisma migrate deploy && npm run db:seed']
    restart: 'no'
    profiles: ['tools']

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
    ports:
      - '3000:3000'

volumes:
  db-data:
